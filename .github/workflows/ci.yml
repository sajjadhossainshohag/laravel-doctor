name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        php: [8.2, 8.3, 8.4]
        laravel:
          - { version: 11, testbench: 9 }
          - { version: 12, testbench: 10 }
          - { version: 13, testbench: 11 }
        stability: [prefer-lowest, prefer-stable]

        exclude:
          - php: 8.2
            laravel: { version: 13, testbench: 11 }

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel.version }} (${{ matrix.stability }})

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: |
          composer require "illuminate/console:^${{ matrix.laravel.version }}.0" "illuminate/contracts:^${{ matrix.laravel.version }}.0" "illuminate/http:^${{ matrix.laravel.version }}.0" "illuminate/support:^${{ matrix.laravel.version }}.0" "illuminate/database:^${{ matrix.laravel.version }}.0" "illuminate/view:^${{ matrix.laravel.version }}.0" "illuminate/routing:^${{ matrix.laravel.version }}.0" "illuminate/cache:^${{ matrix.laravel.version }}.0" --no-interaction --no-progress --${{ matrix.stability }} -W
          composer require "orchestra/testbench:^${{ matrix.laravel.testbench }}.0" --dev --no-interaction --no-progress --${{ matrix.stability }} -W

      - name: Run tests
        run: vendor/bin/phpunit
