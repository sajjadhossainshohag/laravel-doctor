name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        php: [8.2, 8.3, 8.4]
        laravel:
          - { version: 11, testbench: 9 }
          - { version: 12, testbench: 10 }
          - { version: 13, testbench: 11 }
        stability: [prefer-lowest, prefer-stable]

        exclude:
          - php: 8.2
            laravel: { version: 13, testbench: 11 }

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel.version }} (${{ matrix.stability }})

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: |
          rm -f composer.lock
          composer config audit.block-insecure false --no-interaction 2>/dev/null || true
          composer remove illuminate/console illuminate/contracts illuminate/http illuminate/support illuminate/database illuminate/view illuminate/routing illuminate/cache --no-update --no-interaction 2>/dev/null || true
          composer require "laravel/framework:^${{ matrix.laravel.version }}" "orchestra/testbench:^${{ matrix.laravel.testbench }}" --dev --no-interaction --no-progress --${{ matrix.stability }} -W

      - name: Run tests
        run: vendor/bin/phpunit
